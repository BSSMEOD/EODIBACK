global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/eod-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "eod-app-local"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          application: eod
          runtime: local

  - job_name: "eod-app-docker"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app:8081"]
        labels:
          application: eod
          runtime: docker

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          application: eod
          component: node

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          application: eod
          component: containers

  - job_name: "mysql"
    static_configs:
      - targets: ["mysqld-exporter:9104"]
        labels:
          application: eod
          component: mysql

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          application: eod
          component: loki

  - job_name: "alloy"
    static_configs:
      - targets: ["alloy:12345"]
        labels:
          application: eod
          component: alloy

  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          application: eod
          component: grafana

  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - "http://app:8080/healthz"
        labels:
          application: eod
          availability_target: app-internal
      - targets:
          - "https://eodi.jojaemin.com/healthz"
        labels:
          application: eod
          availability_target: prod-public
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
