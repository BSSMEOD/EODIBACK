global:
  resolve_timeout: 5m

route:
  receiver: ops-discord
  group_by: ["alertname", "severity", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: ops-discord
    discord_configs:
      - webhook_url: ${DISCORD_WEBHOOK_URL}
        send_resolved: true
        title: '{{ template "discord.default.title" . }}'
        message: '{{ template "discord.default.message" . }}'
