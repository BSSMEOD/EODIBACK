services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-bssmeod/eodiback}:latest
    container_name: eod-app-dev
    volumes:
      - app-logs-dev:/logs
      - /eod/uploads:/eod/uploads
    restart: always
    ports:
      - "8000:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - BASE_URL=${BASE_URL}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - LOG_DIR=/logs
      - TZ=Asia/Seoul
      - BSM_CLIENT_ID=${BSM_CLIENT_ID}
      - BSM_CLIENT_SECRET=${BSM_CLIENT_SECRET}
      - BSM_OAUTH_BASE_URL=${BSM_OAUTH_BASE_URL}
      - BSM_REDIRECT_URI=${BSM_REDIRECT_URI}
      - FILE_UPLOAD_DIR=/eod/uploads
      - FILE_UPLOAD_BASE_URL=${FILE_UPLOAD_BASE_URL}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eod-network-dev

  mysql:
    image: mysql:8.0
    container_name: eod-mysql-dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data-dev:/var/lib/mysql
    networks:
      - eod-network-dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: eod-prometheus-dev
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
    networks:
      - eod-network-dev

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: eod-node-exporter-dev
    restart: always
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - eod-network-dev

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: eod-cadvisor-dev
    restart: always
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - eod-network-dev

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.19.0
    container_name: eod-mysqld-exporter-dev
    restart: always
    command:
      - --mysqld.address=mysql:3306
      - --mysqld.username=${MYSQL_USER}
    environment:
      - MYSQLD_EXPORTER_PASSWORD=${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eod-network-dev

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.27.0
    container_name: eod-blackbox-exporter-dev
    restart: always
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    ports:
      - "127.0.0.1:9115:9115"
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks:
      - eod-network-dev

  loki:
    image: grafana/loki:3.7.0
    container_name: eod-loki-dev
    restart: always
    command:
      - -config.file=/etc/loki/loki-config.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data-dev:/loki
    networks:
      - eod-network-dev

  alloy:
    image: grafana/alloy:v1.11.3
    container_name: eod-alloy-dev
    restart: always
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy
      - /etc/alloy/config.alloy
    environment:
      - SERVER_NAME=${SERVER_NAME:-local-dev}
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - APP_CONTAINER_NAME=eod-app-dev
      - TZ=Asia/Seoul
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - app-logs-dev:/var/log/eod:ro
      - alloy-data-dev:/var/lib/alloy
    depends_on:
      loki:
        condition: service_started
    networks:
      - eod-network-dev

  grafana:
    image: grafana/grafana:12.4.0
    container_name: eod-grafana-dev
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_METRICS_ENABLED=true
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - eod-network-dev

volumes:
  mysql-data-dev:
    external: true
    name: eod_mysql-data-dev
  app-logs-dev:
    name: eod_app-logs-dev
  loki-data-dev:
    name: eod_loki-data-dev
  alloy-data-dev:
    name: eod_alloy-data-dev

networks:
  eod-network-dev:
    driver: bridge
